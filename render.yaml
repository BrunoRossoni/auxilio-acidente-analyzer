services:
  - type: web
    name: auxilio-acidente-analyzer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: auxilio-acidente-db
          property: connectionString

databases:
  - name: auxilio-acidente-db
    databaseName: auxilio_acidente
    user: auxilio_user
    plan: free
